backend:
  name: github
  repo: United-Tattoo/united-tattoo
  branch: main
  base_url: https://united-tattoos.com
  auth_endpoint: /oauth/auth

publish_mode: simple
local_backend: true
site_url: https://united-tattoos.com
display_url: https://united-tattoos.com
media_folder: public/artists
public_folder: /artists

collections:
  - label: Site Settings
    name: site_settings
    editor:
      preview: false
    files:
      - label: Site Settings
        name: site_settings
        file: src/data/site-settings.json
        format: json
        fields:
          - { label: Site Title, name: siteTitle, widget: string }
          - { label: Site Description, name: siteDescription, widget: string }
          - { label: Site URL, name: siteUrl, widget: string }
          - { label: Logo Image, name: logoImage, widget: image, choose_url: false, media_folder: /public/images, public_folder: /images }
          - { label: Favicon, name: favicon, widget: image, choose_url: false, media_folder: /public/images, public_folder: /images }
          - { label: Address Line 1, name: addressLine1, widget: string }
          - { label: Address Line 2, name: addressLine2, widget: string }
          - { label: City, name: addressLocality, widget: string }
          - { label: State, name: addressRegion, widget: string }
          - { label: Postal Code, name: postalCode, widget: string }
          - { label: Country Code, name: countryCode, widget: string }
          - { label: Phone Number, name: phoneNumber, widget: string }
          - { label: Email, name: email, widget: string }
          - { label: Instagram URL, name: instagram, widget: string, required: false }
          - { label: YouTube URL, name: youtube, widget: string, required: false }
          - { label: Yelp URL, name: yelp, widget: string, required: false }
          - { label: InkRoster URL, name: inkroster, widget: string, required: false }
          - { label: NewsInsiderPost Article URL, name: newsInsiderPostArticle, widget: string, required: false }
          - { label: Tattoo Conventions Article URL, name: tattooConventionsArticle, widget: string, required: false }
          - { label: Latitude, name: geoLatitude, widget: number, value_type: float }
          - { label: Longitude, name: geoLongitude, widget: number, value_type: float }
          - { label: Google Maps URL, name: googleMapsUrl, widget: string }
      - label: Studio Hours
        name: site_hours
        file: src/data/site-hours.json
        format: json
        fields:
          - { label: Hours Summary, name: summary, widget: string, hint: "Used in SEO and LLM text, for example Sunday-Saturday, 10am-8pm." }
          - { label: Footer Summary, name: footerSummary, widget: text, hint: "One line per visible footer line." }
          - label: Daily Hours
            name: hours
            widget: list
            fields:
              - { label: Day, name: day, widget: string }
              - { label: Short Day, name: shortDay, widget: string }
              - { label: Opens, name: opens, widget: string, hint: "24-hour HH:MM format for schema." }
              - { label: Closes, name: closes, widget: string, hint: "24-hour HH:MM format for schema." }
              - { label: Display, name: display, widget: string, hint: "Human-facing footer text." }
      - label: Home Page
        name: home_page
        file: src/data/home.json
        format: json
        fields:
          - { label: Meta Title, name: metaTitle, widget: string }
          - { label: Meta Description, name: metaDescription, widget: text }
          - { label: Floating CTA Label, name: floatingCtaLabel, widget: string }
          - label: Hero
            name: hero
            widget: object
            fields:
              - { label: Kicker, name: kicker, widget: string }
              - { label: Title Lines, name: titleLines, widget: list, field: { label: Line, name: line, widget: string } }
              - { label: Description, name: description, widget: text }
              - { label: Primary CTA Label, name: primaryCtaLabel, widget: string }
              - { label: Primary CTA URL, name: primaryCtaHref, widget: string }
              - { label: Secondary CTA Label, name: secondaryCtaLabel, widget: string }
              - { label: Secondary CTA URL, name: secondaryCtaHref, widget: string }
              - { label: Note, name: note, widget: string }
              - { label: Image, name: image, widget: image, choose_url: false, media_folder: /public/images, public_folder: /images }
              - { label: Image Alt Text, name: imageAlt, widget: string }
          - label: Artists Banner
            name: artistsBanner
            widget: object
            fields:
              - { label: Meta, name: meta, widget: string }
              - { label: Title, name: title, widget: string }
              - { label: Footer Link Label, name: footerLinkLabel, widget: string }
              - { label: Image, name: image, widget: image, choose_url: false, media_folder: /public/artists, public_folder: /artists }
          - label: Work Banner
            name: workBanner
            widget: object
            fields:
              - { label: Meta, name: meta, widget: string }
              - { label: Title, name: title, widget: string }
              - { label: Footer Link Label, name: footerLinkLabel, widget: string }
              - { label: Image, name: image, widget: image, choose_url: false, media_folder: /public/artists, public_folder: /artists }
          - label: Process Banner
            name: processBanner
            widget: object
            fields:
              - { label: Meta, name: meta, widget: string }
              - { label: Title, name: title, widget: string }
              - { label: Footer Text, name: footerText, widget: string }
              - { label: Footer Link Label, name: footerLinkLabel, widget: string }
              - { label: Image, name: image, widget: image, choose_url: false, media_folder: /public/artists, public_folder: /artists }
          - label: Process Steps
            name: processSteps
            widget: list
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Description, name: description, widget: text }
      - label: Booking Form
        name: booking_form
        file: src/data/booking-form.json
        format: json
        fields:
          - { label: Page Title, name: pageTitle, widget: string }
          - { label: Page Description, name: pageDescription, widget: text }
          - label: Hero
            name: hero
            widget: object
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string }
              - { label: Title, name: title, widget: string }
              - { label: Description, name: description, widget: text }
              - { label: Image, name: image, widget: image, choose_url: false, media_folder: /public/images, public_folder: /images }
              - { label: Image Position, name: imagePosition, widget: string }
              - { label: Response Stat, name: responseStat, widget: string }
          - label: Section Copy
            name: sections
            widget: object
            collapsed: true
            fields:
              - label: Artist
                name: artist
                widget: object
                fields:
                  - { label: Label, name: label, widget: string }
                  - { label: Heading, name: heading, widget: string }
                  - { label: Select Label, name: selectLabel, widget: string }
                  - { label: Placeholder, name: placeholder, widget: string }
                  - { label: Hint, name: hint, widget: text }
                  - { label: Manual Availability Label, name: manualAvailabilityLabel, widget: string }
                  - { label: Manual Availability Placeholder, name: manualAvailabilityPlaceholder, widget: string }
                  - { label: Manual Availability Link, name: manualAvailabilityLink, widget: string }
              - label: Contact
                name: contact
                widget: object
                fields:
                  - { label: Label, name: label, widget: string }
                  - { label: Heading, name: heading, widget: string }
              - label: Details
                name: details
                widget: object
                fields:
                  - { label: Label, name: label, widget: string }
                  - { label: Heading, name: heading, widget: string }
                  - { label: Style Label, name: styleLabel, widget: string }
                  - { label: Style Placeholder, name: stylePlaceholder, widget: string }
                  - { label: Placement Label, name: placementLabel, widget: string }
                  - { label: Placement Placeholder, name: placementPlaceholder, widget: string }
                  - { label: Size Label, name: sizeLabel, widget: string }
                  - { label: Size Placeholder, name: sizePlaceholder, widget: string }
                  - { label: Budget Label, name: budgetLabel, widget: string }
                  - { label: Budget Placeholder, name: budgetPlaceholder, widget: string }
                  - { label: Description Label, name: descriptionLabel, widget: string }
                  - { label: Description Placeholder, name: descriptionPlaceholder, widget: string }
              - label: References
                name: references
                widget: object
                fields:
                  - { label: Label, name: label, widget: string }
                  - { label: Heading, name: heading, widget: string }
                  - { label: Description, name: description, widget: text }
                  - { label: Upload Title, name: uploadTitle, widget: string }
                  - { label: Upload Hint, name: uploadHint, widget: string }
          - label: Contact Options
            name: contactOptions
            widget: list
            fields:
              - { label: Value, name: value, widget: string, hint: "Stable value submitted to the API. Change carefully." }
              - { label: Label, name: label, widget: string }
              - { label: Default, name: default, widget: boolean, required: false, default: false }
          - label: Style Options
            name: styleOptions
            widget: list
            fields:
              - { label: Value, name: value, widget: string, hint: "Stable value submitted to the API. Change carefully." }
              - { label: Label, name: label, widget: string }
              - { label: Default, name: default, widget: boolean, required: false, default: false }
          - label: Size Options
            name: sizeOptions
            widget: list
            fields:
              - { label: Value, name: value, widget: string, hint: "Stable value submitted to the API. Change carefully." }
              - { label: Label, name: label, widget: string }
              - { label: Default, name: default, widget: boolean, required: false, default: false }
          - label: Budget Options
            name: budgetOptions
            widget: list
            fields:
              - { label: Value, name: value, widget: string, hint: "Stable value submitted to the API. Change carefully." }
              - { label: Label, name: label, widget: string }
              - { label: Default, name: default, widget: boolean, required: false, default: false }
          - label: Agreements
            name: agreements
            widget: object
            fields:
              - { label: Terms Prefix, name: termsPrefix, widget: string }
              - { label: Terms Joiner, name: termsJoiner, widget: string }
              - { label: Age Text, name: ageText, widget: string }
              - { label: Newsletter Text, name: newsletterText, widget: text }
          - { label: Submit Label, name: submitLabel, widget: string }
          - label: Success Modal
            name: success
            widget: object
            fields:
              - { label: Label, name: label, widget: string }
              - { label: Title, name: title, widget: string }
              - { label: Message, name: message, widget: text }
              - { label: Timing, name: timing, widget: string }
              - { label: Next Heading, name: nextHeading, widget: string }
              - { label: Next Steps, name: nextSteps, widget: list, field: { label: Step, name: step, widget: string } }
              - { label: Primary Action Label, name: primaryActionLabel, widget: string }
              - { label: Secondary Action Label, name: secondaryActionLabel, widget: string }

  - label: Pages
    name: pages
    editor:
      preview: false
    files:
      - label: Aftercare
        name: aftercare
        file: src/content/pages/aftercare.mdx
        format: frontmatter
        fields:
          - { label: Title, name: title, widget: string }
          - { label: Description, name: description, widget: text }
          - { label: Eyebrow, name: eyebrow, widget: string, required: false }
          - { label: Heading, name: heading, widget: string }
          - { label: Intro, name: intro, widget: text, required: false }
          - { label: CTA Eyebrow, name: ctaEyebrow, widget: string, required: false }
          - { label: CTA Text, name: ctaText, widget: text, required: false }
          - { label: CTA Label, name: ctaLabel, widget: string, required: false }
          - { label: CTA URL, name: ctaHref, widget: string, required: false }
          - { label: Body, name: body, widget: markdown }
      - label: Privacy Policy
        name: privacy
        file: src/content/pages/privacy.mdx
        format: frontmatter
        fields:
          - { label: Title, name: title, widget: string }
          - { label: Description, name: description, widget: text }
          - { label: Eyebrow, name: eyebrow, widget: string, required: false }
          - { label: Heading, name: heading, widget: string }
          - { label: Last Updated, name: lastUpdated, widget: string, required: false }
          - { label: Body, name: body, widget: markdown }
      - label: Terms of Service
        name: terms
        file: src/content/pages/terms.mdx
        format: frontmatter
        fields:
          - { label: Title, name: title, widget: string }
          - { label: Description, name: description, widget: text }
          - { label: Eyebrow, name: eyebrow, widget: string, required: false }
          - { label: Heading, name: heading, widget: string }
          - { label: Last Updated, name: lastUpdated, widget: string, required: false }
          - { label: Body, name: body, widget: markdown }

  - label: Blog
    label_singular: Blog Post
    name: blog
    folder: src/content/blog
    create: true
    extension: mdx
    format: frontmatter
    slug: "{{slug}}"
    identifier_field: title
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: text }
      - { label: Publish Date, name: publishDate, widget: datetime, format: "YYYY-MM-DD" }
      - { label: Updated Date, name: updatedDate, widget: datetime, format: "YYYY-MM-DD", required: false }
      - { label: Author, name: author, widget: string, default: United Tattoo }
      - { label: Tags, name: tags, widget: list, required: false, field: { label: Tag, name: tag, widget: string } }
      - { label: Image, name: image, widget: image, required: false, choose_url: false }
      - { label: Draft, name: draft, widget: boolean, required: false, default: false }
      - { label: Body, name: body, widget: markdown }

  - label: Artists
    label_singular: Artist
    name: artists
    folder: src/content/artists
    create: true
    delete: true
    extension: mdx
    format: frontmatter
    slug: "{{slug}}"
    identifier_field: name
    summary: "{{name}}"
    editor:
      preview: false
    fields:
      - { label: Name, name: name, widget: string, hint: "Used for the artist page title and the new file slug." }
      - { label: Archived, name: archived, widget: boolean, required: false, default: false, hint: "Hide this artist from the live site and booking without deleting the entry." }
      - { label: Portrait, name: portrait, widget: image, choose_url: false, media_folder: /public/artists, public_folder: /artists }
      - { label: Gallery Directory, name: galleryDir, widget: string, hint: "Advanced: path relative to public, for example artists/Jane-Smith." }
      - { label: Booking CC Email, name: bookingEmailCc, widget: string, required: false, hint: "Advanced: changing this affects booking notifications." }
      - { label: Specialties, name: specialties, widget: list, required: false, field: { label: Specialty, name: specialty, widget: string } }
      - { label: Instagram, name: instagram, widget: string, required: false }
      - { label: Facebook, name: facebook, widget: string, required: false }
      - { label: TikTok, name: tiktok, widget: string, required: false }
      - { label: Twitch, name: twitch, widget: string, required: false }
      - { label: Portfolio URL, name: portfolioUrl, widget: string, required: false }
      - { label: Calendar ID, name: calendarId, widget: string, required: false, hint: "Advanced: must match the Nextcloud calendar." }
      - { label: Accepting Bookings, name: acceptingBookings, widget: boolean, default: true }
      - label: Weekly Schedule
        name: schedule
        widget: object
        required: false
        collapsed: true
        hint: "Advanced: use HH:MM-HH:MM or closed."
        fields:
          - { label: Monday, name: monday, widget: string, required: false }
          - { label: Tuesday, name: tuesday, widget: string, required: false }
          - { label: Wednesday, name: wednesday, widget: string, required: false }
          - { label: Thursday, name: thursday, widget: string, required: false }
          - { label: Friday, name: friday, widget: string, required: false }
          - { label: Saturday, name: saturday, widget: string, required: false }
          - { label: Sunday, name: sunday, widget: string, required: false }
      - { label: Buffer Minutes, name: bufferMinutes, widget: number, value_type: int, min: 0, default: 30, hint: "Advanced: booking buffer after calendar events." }
      - label: Testimonials
        name: testimonials
        widget: list
        required: false
        fields:
          - { label: Quote, name: quote, widget: text }
          - { label: Client, name: client, widget: string }
      - label: Portfolio Images
        name: cmsPortfolioUploads
        widget: list
        required: false
        hint: "These images are shown on this artist's portfolio tab. Reorder this list to control display order."
        field: { label: Image, name: image, widget: image, choose_url: false, media_folder: /public/artists, public_folder: /artists }
      - label: Flash Images
        name: cmsFlashUploads
        widget: list
        required: false
        hint: "These images are shown on this artist's flash tab. Reorder this list to control display order."
        field: { label: Image, name: image, widget: image, choose_url: false, media_folder: /public/artists, public_folder: /artists }
      - { label: Body, name: body, widget: markdown }
