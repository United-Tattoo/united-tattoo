name: CI

on:
  push:
    branches:
      - main
      - master
      - astro-migration
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install root dependencies
        run: npm install --no-audit --no-fund

      - name: Install Astro dependencies
        run: npm --prefix astro install --no-audit --no-fund

      - name: Build Astro
        run: npm run ci:build

      - name: Verify build output
        run: npm run ci:smoke

      - name: Preview smoke check
        shell: bash
        run: |
          set -euo pipefail
          # Start Astro preview server in background
          npm --prefix astro run preview > preview.log 2>&1 &
          PREVIEW_PID=$!
          # Give it a moment to start
          sleep 5
          if ! kill -0 "$PREVIEW_PID" 2>/dev/null; then
            echo "Preview process exited prematurely. Logs:" >&2
            head -100 preview.log >&2 || true
            exit 1
          fi
          # Cleanly stop the preview
          kill "$PREVIEW_PID" || true
          wait "$PREVIEW_PID" || true
          echo "Preview started successfully (smoke check passed)."
