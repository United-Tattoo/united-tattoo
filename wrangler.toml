name = "united-tattoo"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
main = ".open-next/worker.js"

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "united-tattoo"
database_id = "7191a4c4-e3b2-49c6-bd8d-9cc3394977ec"

# R2 bucket binding
[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "united-tattoo"

# R2 bucket for OpenNext incremental cache
[[r2_buckets]]
binding = "NEXT_INC_CACHE_R2_BUCKET"
bucket_name = "united-tattoo-inc-cache"

[[services]]
binding = "WORKER_SELF_REFERENCE"
service = "united-tattoo"

# Environment variables for production
[env.production.vars]
NEXTAUTH_URL = "https://united-tattoos.com"
NODE_ENV = "production"

# Environment variables for preview
[env.preview.vars]
NEXTAUTH_URL = "https://united-tattoos.com"
NODE_ENV = "production"

[dev]
ip = "0.0.0.0"
port = 8787
local_protocol = "http"
